name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint HTML & CSS
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HTMLHint
        id: htmlhint
        shell: bash
        run: |
          set +e
          OUTPUT=$(npm run --silent lint:html 2>&1)
          EXIT_CODE=$?
          set -e
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          {
            echo "output<<HTMLHINT_EOF"
            echo "${OUTPUT}"
            echo "HTMLHINT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Stylelint
        id: stylelint
        shell: bash
        run: |
          set +e
          OUTPUT=$(npm run --silent lint:css 2>&1)
          EXIT_CODE=$?
          set -e
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          {
            echo "output<<STYLELINT_EOF"
            echo "${OUTPUT}"
            echo "STYLELINT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post summary comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const htmlhintOk  = '${{ steps.htmlhint.outputs.exit_code }}'  === '0';
            const stylelintOk = '${{ steps.stylelint.outputs.exit_code }}' === '0';
            const icon  = (ok) => ok ? '✅' : '❌';
            const fence = (txt) => txt.trim()
              ? `\`\`\`\n${txt.trim().slice(0, 3000)}\n\`\`\``
              : '_問題なし_';

            const body = [
              '<!-- ci-lint-summary -->',
              '## CI Lint Summary',
              '',
              '| チェック | 結果 |',
              '|----------|------|',
              `| HTMLHint  | ${icon(htmlhintOk)}  |`,
              `| Stylelint | ${icon(stylelintOk)} |`,
              '',
              `### ${icon(htmlhintOk)} HTMLHint`,
              fence(`${{ steps.htmlhint.outputs.output }}`),
              '',
              `### ${icon(stylelintOk)} Stylelint`,
              fence(`${{ steps.stylelint.outputs.output }}`),
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- ci-lint-summary -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail if any lint error
        if: always()
        run: |
          if [ "${{ steps.htmlhint.outputs.exit_code }}" != "0" ] || \
             [ "${{ steps.stylelint.outputs.exit_code }}" != "0" ]; then
            echo "One or more lint checks failed."
            exit 1
          fi
